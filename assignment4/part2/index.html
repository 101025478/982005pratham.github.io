<!-- layout updated -->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>

 <style>
  .thumb-bar img {
    width: 100px;
    cursor: pointer;
  }

  .displayed-img {
    width: 500px;
    display: block;
  }

  .full-img {
    position: relative;
    width: 500px;
  }

  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1; /* below button */
  }

  button {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 2; /* above overlay */
    cursor: pointer;
  }
</style>

</head>
<body>

<h1>Image gallery example</h1>

<div class="full-img">
  <img class="displayed-img"
       src="https://mdn.github.io/shared-assets/images/examples/learn/gallery/pic1.jpg"
       alt="Closeup of a human eye">

  <div class="overlay"></div>
  <button class="dark">Darken</button>
</div>

<div class="thumb-bar"></div>

<script src="main.js"></script>

</body>
</html>
