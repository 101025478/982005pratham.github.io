<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Image Gallery</title>

 <style>
  img {
    max-width: 100%;
  }

  .thumb-bar img {
    display: block;
    width: 20%;
    float: left;
    cursor: pointer;
  }

  .displayed-img {
    display: block;
    width: 500px;
  }

  .full-img {
    position: relative;
    display: block;
    width: 500px;
  }

  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 500px;
    height: 100%;
  }

  button {
    border: 0;
    background: rgba(150,150,150,0.6);
    text-shadow: 1px 1px 1px white;
    border-radius: 10px;
    position: absolute;
    cursor: pointer;
    top: 10px;
    left: 10px;
  }
</style>

</head>
<body>

<h1>Image gallery example</h1>

<div class="full-img">
  <img class="displayed-img"
       src="https://mdn.github.io/shared-assets/images/examples/learn/gallery/pic1.jpg"
       alt="Closeup of a human eye">

  <div class="overlay"></div>
  <button class="dark">Darken</button>
</div>

<div class="thumb-bar"></div>

<script src="main.js"></script>

</body>
</html>
